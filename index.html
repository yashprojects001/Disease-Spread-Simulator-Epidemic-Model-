<!DOCTYPE html>
<html>
<head>
  <title>Disease Spread Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🦠 Epidemic Simulator</h1>

<canvas id="canvas"></canvas>

<div class="controls">
  <label>Infection Rate</label>
  <input type="range" id="infectionRate" min="0" max="1" step="0.1" value="0.3">

  <label>Population</label>
  <input type="number" id="population" value="100">

  <button onclick="startSimulation()">Restart</button>
</div>

<div class="stats">
  <p id="healthy"></p>
  <p id="infected"></p>
  <p id="recovered"></p>
  <p id="dead"></p>
</div>

<script src="script.js"></script>
</body>
</html>
